<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>Pero</title>
</head>
<body>
  <main class="popup">
    <header class="popup__header">
      <div class="brand">
        <div class="brand__icon" id="icon-feather"></div>
        <h1 class="brand__name">Pero</h1>
      </div>
      <span class="version" id="appVersion">v0.0.0</span>
    </header>
    
    <section class="popup__content">
      <div class="card">
        <div class="card__icon" id="icon-bug"></div>
        <div class="card__info">
          <label for="debugToggle" class="card__title">Режим розробника</label>
          <span class="card__desc">Логування .NET трафіку</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="debugToggle" class="toggle__input" aria-label="Увімкнути режим розробника">
          <span class="toggle__slider"></span>
        </label>
      </div>
    </section>

    <footer class="popup__footer">
      <button id="openDashboardBtn" class="btn-primary">
        <div class="btn-primary__icon" id="icon-dashboard"></div>
        <span>Відкрити панель інструментів</span>
      </button>
    </footer>
  </main>
  <script type="module" src="./index.ts"></script>
</body>
</html>
