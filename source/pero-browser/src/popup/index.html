<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>Pero Settings</title>
</head>
<body>
  <main class="settings-app">
    <header class="settings-app__header">
      <h1 class="settings-app__brand">Pero 🪶</h1>
      <span class="settings-app__version" id="appVersion">v0.0.0</span>
    </header>
    
    <section class="settings-app__controls">
      <article class="setting-item">
        <div class="setting-item__info">
          <label for="debugToggle" class="setting-item__label">Debug Mode</label>
          <span class="setting-item__desc">Log .NET traffic to Offscreen Console</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="debugToggle" class="toggle-switch__input" aria-label="Toggle Debug Mode">
          <span class="toggle-switch__slider"></span>
        </label>
      </article>
    </section>
  </main>
  <script type="module" src="./index.ts"></script>
</body>
</html>
