name: CI Build Check
on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./source/pero-browser

    steps:
      - name: Fetch
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: source/pero-browser/package-lock.json

      - name: Setup
        run: npm install

      - name: Build
        run: npm run build