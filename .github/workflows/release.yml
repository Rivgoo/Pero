name: Create Pero Release
'on':
  push:
    tags:
      - v*
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Build
        run: npm run build
      - name: Package
        id: zip
        run: |
          # Extract version from manifest
          VER=$(grep '"version":' public/manifest.json | cut -d '"' -f 4)

          # Define names
          FOLDER_NAME="Pero_v${VER}"
          ZIP_NAME="${FOLDER_NAME}.zip"

          # Rename dist folder to Pero_vX.X
          mv dist $FOLDER_NAME

          # Zip the renamed folder
          zip -r $ZIP_NAME $FOLDER_NAME

          # Output variables for the next step
          echo "filename=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VER}" >> $GITHUB_OUTPUT
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Pero_v${{ steps.zip.outputs.version }}'
          files: '${{ steps.zip.outputs.filename }}'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'