name: Create Pero Release
on:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x 

      - name: Install WASM Workload
        run: dotnet workload install wasm-tools

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Package
        id: zip
        run: |
          cd source/pero-browser
          
          VER=$(grep '"version":' public/manifest.json | cut -d '"' -f 4)
          
          FOLDER_NAME="Pero_v${VER}"
          ZIP_NAME="${FOLDER_NAME}.zip"
          
          mv dist $FOLDER_NAME
          
          zip -r $ZIP_NAME $FOLDER_NAME
          
          mv $ZIP_NAME ../../$ZIP_NAME
          
          echo "filename=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VER}" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Pero_v${{ steps.zip.outputs.version }}'
          files: '${{ steps.zip.outputs.filename }}'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'